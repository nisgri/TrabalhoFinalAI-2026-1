spring.application.name=ecommerce-backend

# H2 em memória
spring.datasource.url=jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Webhook n8n
n8n.webhook.url=http://localhost:5678/webhook-test/pedido-analise

# CORS para o frontend React
app.cors.allowed-origins=http://localhost:5173

server.port=8080
